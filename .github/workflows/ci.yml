name: ci

# Run tests on every pull request and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false # no external deps / go.sum, so module caching is unnecessary

      - name: Vet
        run: make vet

      - name: Test
        run: make test
